<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% if page.title and page.title != "Home" %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="{{ '/' | relative_url }}">
          <span class="brand-copy">
            <strong>{{ site.title }}</strong>
            <span>{{ site.data.profile.affiliation }}</span>
          </span>
        </a>

        <nav class="site-nav" aria-label="Primary">
          {% for item in site.data.navigation.main %}
          <a
            href="{{ item.url | relative_url }}"
            {% if page.url == item.url %}class="active"{% endif %}
          >
            {{ item.title }}
          </a>
          {% endfor %}
        </nav>
      </header>

      <main id="top" class="page-main{% unless page.url == '/' %} page-main-inner{% endunless %}">
        {{ content }}
      </main>

      <footer class="site-footer">
        <p>&copy; Copyright 2026 {{ site.title }}.</p>
        <div class="footer-links">
          <a href="{{ site.data.profile.scholar_url }}" target="_blank" rel="noreferrer">Google Scholar</a>
          <span>{{ site.data.profile.email_display }}</span>
        </div>
      </footer>
    </div>
  </body>
</html>
