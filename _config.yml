title: Zhizhen Zhang
description: Academic homepage for Zhizhen Zhang, focused on embodied AI, multimodal learning, and video understanding.
url: "https://daisy-zzz.github.io"
baseurl: "/homepage"
timezone: Australia/Brisbane
markdown: kramdown
permalink: pretty
include:
  - _pages

exclude:
  - README.md
  - vendor
  - .bundle
  - Gemfile
  - Gemfile.lock

collections_dir: .

defaults:
  - scope:
      path: ""
    values:
      layout: default
