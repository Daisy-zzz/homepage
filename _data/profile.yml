bio_paragraph_1: Zhizhen Zhang is a PhD student at UQ EECS, where he studies embodied AI, computer vision, and robotics. His long-term goal is to build generalized embodied agents that can perceive, reason, and act robustly in complex real-world environments.
# bio_paragraph_2: His recent work centers on vision, temporal reasoning, and multimodal perception. Earlier research also touched on video understanding and social media understanding problems.
focus_areas:
  - name: Embodied AI
    description: Generalized embodied agents, action-conditioned learning, and robust decision-making in the physical world.
  - name: Computer Vision
    description: Visual perception, scene understanding, and multimodal representation learning for embodied systems.
  - name: Robotics
    description: Learning-based robotics with an emphasis on perception, control, and generalization across tasks.
  - name: Past Interests
    description: Earlier work also included video understanding and social media prediction problems.
