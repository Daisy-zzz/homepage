focus_line: Embodied AI · Vision-Language Learning · Video Understanding
hero_title: Academic systems for perception, action, and temporal intelligence.
lead: Zhizhen Zhang is affiliated with the School of Electrical Engineering and Computer Science at The University of Queensland. His recent work spans embodied AI, multimodal representation learning, efficient video analytics, and temporal modeling for complex visual environments.
