bio_paragraph_1: Zhizhen Zhang works on machine learning systems that connect visual perception, language grounding, and downstream decision-making. The visible publication record points to a consistent interest in temporally structured data, from efficient long-video recognition to cross-skill model merging for generalist embodied agents.
bio_paragraph_2: Recent papers focus on embodied AI, vision-language pretraining, temporal graph modeling, and multimodal robustness. This site is organized as a public GitHub Pages academic homepage so the profile, links, and publications can be maintained in a clear open-source structure.
focus_areas:
  - name: Embodied AI
    description: Generalist agents, manipulation-oriented representation learning, and vision-language-action systems.
  - name: Video Understanding
    description: Long-form recognition, moment retrieval, temporal localization, and redundancy-aware inference.
  - name: Multimodal Learning
    description: Vision-language pretraining, cross-skill transfer, and robust grounded representations.
  - name: Networked Intelligence
    description: Popularity prediction, cascade modeling, and learning over dynamic graph-structured signals.
