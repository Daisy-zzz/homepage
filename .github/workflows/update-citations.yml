name: Refresh citation counts

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install pyyaml

      - name: Refresh citations
        env:
          OPENALEX_MAILTO: ${{ vars.OPENALEX_MAILTO }}
        run: python scripts/update_citations.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No citation updates found."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/publications.yml _data/profile.yml
          git commit -m "Refresh citation counts"
          git push
